name: Auto Scrape Nodes

on:
  schedule:
    - cron: "0 12 * * *"  # 每天 20:00（北京时间 UTC+8），即 UTC 12:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-scrape-nodes
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [0, 1, 2, 3]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper Script
        run: python scraper.py --group ${{ matrix.group }} --groups 4

      - name: Upload Subscription
        uses: actions/upload-artifact@v4
        with:
          name: sub-${{ matrix.group }}
          path: output/sub-${{ matrix.group }}.txt
          retention-days: 1

  merge:
    needs: scrape
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download All Subscriptions
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge and Write Output
        run: |
          mkdir -p output
          for i in 0 1 2 3; do
            cp "artifacts/sub-$i/sub-$i.txt" "output/sub-$i.txt"
          done
          python scraper.py --merge --groups 4

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/sub*.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "自动更新节点: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:master
          fi
